<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f8fb;
        }

        header {
            background: linear-gradient(90deg, #00c6ff, #0a3d91);
        }

        .offcanvas {
            background: linear-gradient(180deg, #0a3d91, #001f4d) !important;
            color: #fff;
        }

        .offcanvas a {
            color: #fff;
            text-decoration: none;
        }

        .offcanvas a:hover {
            color: #00c6ff;
        }

        .list-group-item {
            background: transparent;
            border: none;
        }

        .btn-menu {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
        }
    </style>
</head>

<body>

    <header class="p-3 text-white d-flex justify-content-between align-items-center shadow">
        <h4 class="m-0">Meu App</h4>

        <div>
            Olá, <strong>{login}</strong>
            <a href="index.php?class=DashboardForm&method=sair" class="btn btn-light btn-sm ms-3">Sair</a>
        </div>
    </header>

    <div class="container-fluid">

        <button class="btn btn-menu text-white m-3" data-bs-toggle="offcanvas" data-bs-target="#menu">
            ☰ Menu
        </button>

    </div>

    <div class="offcanvas offcanvas-start" id="menu">
        <div class="offcanvas-header">
            <h5>Menu</h5>
            <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
            <ul class="list-group">

                {menu_usuarios}

                <li class="list-group-item">
                    <a href="index.php?class=DashboardForm&page=preferenciaList">Preferências</a>
                </li>

                <li class="list-group-item">
                    <a href="index.php?class=DashboardForm&page=caracteristicaList">Características</a>
                </li>

                <li class="list-group-item">
                    <a href="index.php?class=DashboardForm&page=testemunhoList">
                        Testemunhos
                    </a>
                </li>

                <li class="list-group-item">
                    <a href="index.php?class=ContatoList">Contato</a>
                </li>

            </ul>
        </div>
    </div>

    <div class="container mt-4">
        {conteudo}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
