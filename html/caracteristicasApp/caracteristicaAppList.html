<div class="container mt-4">
    <div class="card shadow p-3">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="m-0">Características do Aplicativo</h4>

            <!-- botão que abre o modal de cadastro -->
            <button class="btn btn-custom bg-primary text-white" data-bs-toggle="modal" data-bs-target="#modalFormApp">
                <i class="bi bi-plus-lg"></i> Inserir
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-center">Editar</th>
                        <th class="text-center">Excluir</th>
                        <th>Título</th>
                        <th>Descrição</th>
                    </tr>
                </thead>

                <!-- o php vai preencher esse buraco com todas as linhas -->
                <tbody>
                    {items}
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalFormApp">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header text-white" style="background: linear-gradient(90deg, #00c6ff, #0072ff)">
                <h5 class="modal-title">Cadastro de Característica do Aplicativo</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="modalBodyApp">
                <div class="text-center p-4">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Carregando...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // quando clicar em "inserir", busca o formulário vazio via PHP
    document
        .querySelector('[data-bs-target="#modalFormApp"]')
        .addEventListener('click', function () {
            fetch('index.php?class=CaracteristicaAppForm')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('modalBodyApp').innerHTML = html;
                });
        });

    // quando clicar em "editar", busca o formulário preenchido
    document.addEventListener('click', function (e) {
        if (e.target.closest('.btn-edit')) {
            const id = e.target.closest('.btn-edit').dataset.id;

            fetch(`index.php?class=CaracteristicaAppForm&method=edit&id=${id}`)
                .then(res => res.text())
                .then(html => {
                    document.getElementById('modalBodyApp').innerHTML = html;

                    let modal = new bootstrap.Modal(document.getElementById('modalFormApp'));
                    modal.show();
                });
        }
    });
</script>
