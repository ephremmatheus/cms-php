<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Cadastro</title>
</head>
<body>
    <h2>Cadastrar Usuário</h2>
    <div style="color: red;">{mensagem}</div>
    <form method="post" action="index.php?class=RegistroForm&method=salvar">
        <label>Nome</label>
        <input name="nome" type="text" value="{nome}" required />
        <br><br>
        <label>E-mail</label>
        <input name="email" type="email" value="{email}" required />
        <br><br>
        <label>Senha</label>
        <input name="senha" type="password" required />
        <br><br>
        <input type="submit" value="Cadastrar" />
    </form>
    <p><a href="index.php?class=LoginForm">Já tem conta? Faça login</a></p>
</body>
</html>
