<form method="post" action="index.php?class=ContatoForm&method=save">

<div class="container-fluid">

    <div class="mb-3">
        <label class="form-label">Código</label>
        <input name="codigo_mensagem" readonly class="form-control" value="{codigo_mensagem}" style="background-color: #ccc;">
    </div>

    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input name="nome" class="form-control" value="{nome}" minlength="3" maxlength="100" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{email}" maxlength="150" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Telefone</label>
        <input name="telefone" class="form-control" value="{telefone}" maxlength="20" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Mensagem</label>
        <textarea name="mensagem" class="form-control" minlength="10" maxlength="1000" required>{mensagem}</textarea>
    </div>

    <div class="d-grid">
        <button class="btn btn-primary">Salvar</button>
    </div>

</div>

</form>
