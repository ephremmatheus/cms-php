<form method="POST" action="index.php?class=PreferenciaForm&method=save">
  <div class="container-fluid">
    <input name="id" type="hidden" value="{id}" />

    <h5 class="mb-3">Geral</h5>

    <div class="mb-3">
      <label class="form-label">Título Landing</label>
      <input name="titulo_landing_page" class="form-control" value="{titulo_landing_page}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Favicon (URL)</label>
      <input name="favicon" class="form-control" value="{favicon}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Logo do Cabeçalho</label>
      <input name="logo_cabecalho" class="form-control" value="{logo_cabecalho}" />
    </div>

    <h5 class="mt-4 mb-3">Redes Sociais</h5>

    <div class="mb-3">
      <label class="form-label">Link do Facebook</label>
      <input name="link_facebook" class="form-control" value="{link_facebook}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Link do Instagram</label>
      <input name="link_instagram" class="form-control" value="{link_instagram}" />
    </div>

    <h5 class="mt-4 mb-3">Seção Home</h5>

    <div class="mb-3">
      <label class="form-label">Título da Home</label>
      <input name="titulo_secao_home" class="form-control" value="{titulo_secao_home}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Subtítulo da Home</label>
      <input name="subtitulo_secao_home" class="form-control" value="{subtitulo_secao_home}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Imagem da Home (URL)</label>
      <input name="imagem_secao_home" class="form-control" value="{imagem_secao_home}" />
    </div>

    <h5 class="mt-4 mb-3">Características</h5>

    <div class="mb-3">
      <label class="form-label">Título das Características</label>
      <input name="titulo_caracteristicas_home" class="form-control" value="{titulo_caracteristicas_home}" />
    </div>

    <h5 class="mt-4 mb-3">Testemunhos</h5>

    <div class="mb-3">
      <label class="form-label">Título da Seção de Testemunhos</label>
      <input name="titulo_secao_testemunho" class="form-control" value="{titulo_secao_testemunho}" />
    </div>

    <h5 class="mt-4 mb-3">Loja de Apps</h5>

    <div class="mb-3">
      <label class="form-label">Título da Loja</label>
      <input name="titulo_secao_loja_apps" class="form-control" value="{titulo_secao_loja_apps}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Subtítulo da Loja</label>
      <input name="subtitulo_secao_loja_apps" class="form-control" value="{subtitulo_secao_loja_apps}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Imagem da Loja (URL)</label>
      <input name="imagem_secao_loja_apps" class="form-control" value="{imagem_secao_loja_apps}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Imagem App Store (URL)</label>
      <input name="imagem_appstore" class="form-control" value="{imagem_appstore}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Imagem Play Store (URL)</label>
      <input name="imagem_playstore" class="form-control" value="{imagem_playstore}" />
    </div>

    <h5 class="mt-4 mb-3">Contato</h5>

    <div class="mb-3">
      <label class="form-label">Telefone de Contato</label>
      <input name="telefone_contato" class="form-control" value="{telefone_contato}" />
    </div>

    <h5 class="mt-4 mb-3">Rodapé</h5>

    <div class="mb-3">
      <label class="form-label">Logo do Rodapé (URL)</label>
      <input name="logo_rodape" class="form-control" value="{logo_rodape}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Mensagem de Copyright</label>
      <input name="mensagem_copyright" class="form-control" value="{mensagem_copyright}" />
    </div>

    <div class="mb-3">
      <label class="form-label">URL do Rodapé</label>
      <input name="url_rodape" class="form-control" value="{url_rodape}" />
    </div>

    <div class="mb-3">
      <label class="form-label">Mensagem "Powered by"</label>
      <input name="mensagem_powered" class="form-control" value="{mensagem_powered}" />
    </div>

    <div class="d-grid">
      <button class="btn btn-primary">Salvar</button>
    </div>
  </div>
</form>
