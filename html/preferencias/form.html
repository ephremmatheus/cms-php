<form method="POST" action="index.php?class=PreferenciaForm&method=save">

    <input name="id" type="hidden" readonly="1" value="{id}">

    <h3>Geral</h3>
    <label>Título Landing</label>
    <input name="titulo_landing_page" type="text" value="{titulo_landing_page}">

    <label>Favicon</label>
    <input name="favicon" type="text" value="{favicon}">

    <label>Logo Cabeçalho</label>
    <input name="logo_cabecalho" type="text" value="{logo_cabecalho}">

    <h3>Redes Sociais</h3>
    <label>Facebook</label>
    <input name="link_facebook" type="text" value="{link_facebook}">

    <label>Instagram</label>
    <input name="link_instagram" type="text" value="{link_instagram}">

    <h3>Seção Home</h3>
    <label>Título Home</label>
    <input name="titulo_secao_home" type="text" value="{titulo_secao_home}">

    <label>Subtítulo Home</label>
    <input name="subtitulo_secao_home" type="text" value="{subtitulo_secao_home}">

    <label>Imagem Home</label>
    <input name="imagem_secao_home" type="text" value="{imagem_secao_home}">

    <h3>Características</h3>
    <label>Título Características</label>
    <input name="titulo_caracteristicas_home" type="text" value="{titulo_caracteristicas_home}">

    <h3>Testemunhos</h3>
    <label>Título Testemunho</label>
    <input name="titulo_secao_testemunho" type="text" value="{titulo_secao_testemunho}">

    <h3>Loja Apps</h3>
    <label>Título Loja Apps</label>
    <input name="titulo_secao_loja_apps" type="text" value="{titulo_secao_loja_apps}">

    <label>Subtítulo Loja Apps</label>
    <input name="subtitulo_secao_loja_apps" type="text" value="{subtitulo_secao_loja_apps}">

    <label>Imagem Loja Apps</label>
    <input name="imagem_secao_loja_apps" type="text" value="{imagem_secao_loja_apps}">

    <label>Imagem App Store</label>
    <input name="imagem_appstore" type="text" value="{imagem_appstore}">

    <label>Imagem Play Store</label>
    <input name="imagem_playstore" type="text" value="{imagem_playstore}">

    <h3>Contato</h3>
    <label>Telefone</label>
    <input name="telefone_contato" type="text" value="{telefone_contato}">

    <h3>Rodapé</h3>
    <label>Logo Rodapé</label>
    <input name="logo_rodape" type="text" value="{logo_rodape}">

    <label>Copyright</label>
    <input name="mensagem_copyright" type="text" value="{mensagem_copyright}">

    <label>URL Rodapé</label>
    <input name="url_rodape" type="text" value="{url_rodape}">

    <label>Mensagem Powered</label>
    <input name="mensagem_powered" type="text" value="{mensagem_powered}">

    <br><br>
    <input type="submit" value="Salvar">
</form>
