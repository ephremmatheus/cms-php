<head>
    <meta charset="utf-8">
    <title>Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<form method="POST" action="index.php?class=PreferenciaForm&method=save" class="container mt-5">

    <input name="id" type="hidden" value="{id}">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="mb-3">Geral</h3>

            <div class="mb-3">
                <label class="form-label">Título Landing</label>
                <input name="titulo_landing_page" class="form-control" value="{titulo_landing_page}">
            </div>

            <div class="mb-3">
                <label class="form-label">Favicon</label>
                <input name="favicon" class="form-control" value="{favicon}">
            </div>

            <div class="mb-3">
                <label class="form-label">Logo Cabeçalho</label>
                <input name="logo_cabecalho" class="form-control" value="{logo_cabecalho}">
            </div>

            <h3 class="mt-4 mb-3">Redes Sociais</h3>

            <div class="mb-3">
                <label class="form-label">Facebook</label>
                <input name="link_facebook" class="form-control" value="{link_facebook}">
            </div>

            <div class="mb-3">
                <label class="form-label">Instagram</label>
                <input name="link_instagram" class="form-control" value="{link_instagram}">
            </div>

            <h3 class="mt-4 mb-3">Seção Home</h3>

            <div class="mb-3">
                <label class="form-label">Título Home</label>
                <input name="titulo_secao_home" class="form-control" value="{titulo_secao_home}">
            </div>

            <div class="mb-3">
                <label class="form-label">Subtítulo Home</label>
                <input name="subtitulo_secao_home" class="form-control" value="{subtitulo_secao_home}">
            </div>

            <div class="mb-3">
                <label class="form-label">Imagem Home</label>
                <input name="imagem_secao_home" class="form-control" value="{imagem_secao_home}">
            </div>

            <h3 class="mt-4 mb-3">Características</h3>

            <div class="mb-3">
                <label class="form-label">Título Características</label>
                <input name="titulo_caracteristicas_home" class="form-control" value="{titulo_caracteristicas_home}">
            </div>

            <h3 class="mt-4 mb-3">Testemunhos</h3>

            <div class="mb-3">
                <label class="form-label">Título Testemunho</label>
                <input name="titulo_secao_testemunho" class="form-control" value="{titulo_secao_testemunho}">
            </div>

            <h3 class="mt-4 mb-3">Loja Apps</h3>

            <div class="mb-3">
                <label class="form-label">Título Loja Apps</label>
                <input name="titulo_secao_loja_apps" class="form-control" value="{titulo_secao_loja_apps}">
            </div>

            <div class="mb-3">
                <label class="form-label">Subtítulo Loja Apps</label>
                <input name="subtitulo_secao_loja_apps" class="form-control" value="{subtitulo_secao_loja_apps}">
            </div>

            <div class="mb-3">
                <label class="form-label">Imagem Loja Apps</label>
                <input name="imagem_secao_loja_apps" class="form-control" value="{imagem_secao_loja_apps}">
            </div>

            <div class="mb-3">
                <label class="form-label">Imagem App Store</label>
                <input name="imagem_appstore" class="form-control" value="{imagem_appstore}">
            </div>

            <div class="mb-3">
                <label class="form-label">Imagem Play Store</label>
                <input name="imagem_playstore" class="form-control" value="{imagem_playstore}">
            </div>

            <h3 class="mt-4 mb-3">Contato</h3>

            <div class="mb-3">
                <label class="form-label">Telefone</label>
                <input name="telefone_contato" class="form-control" value="{telefone_contato}">
            </div>

            <h3 class="mt-4 mb-3">Rodapé</h3>

            <div class="mb-3">
                <label class="form-label">Logo Rodapé</label>
                <input name="logo_rodape" class="form-control" value="{logo_rodape}">
            </div>

            <div class="mb-3">
                <label class="form-label">Copyright</label>
                <input name="mensagem_copyright" class="form-control" value="{mensagem_copyright}">
            </div>

            <div class="mb-3">
                <label class="form-label">URL Rodapé</label>
                <input name="url_rodape" class="form-control" value="{url_rodape}">
            </div>

            <div class="mb-3">
                <label class="form-label">Mensagem Powered</label>
                <input name="mensagem_powered" class="form-control" value="{mensagem_powered}">
            </div>

            <button class="btn btn-primary mt-3">Salvar</button>

        </div>
    </div>

</form>
