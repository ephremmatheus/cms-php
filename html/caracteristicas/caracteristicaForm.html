<form method="post" action="index.php?class=CaracteristicaForm&method=save">

    <div class="container-fluid">

        <!-- campo escondido para guardar o codigo  -->
        <div class="mb-3">
            <label class="form-label">Código</label>
            <input name="codigo_caracteristica" readonly class="form-control" value="{codigo_caracteristica}"
                style="background-color: #ccc;">
        </div>

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input name="titulo" class="form-control" value="{titulo}" maxlength="100" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea name="descricao" class="form-control" maxlength="500" required>{descricao}</textarea>
        </div>

        <div class="d-grid">
            <button class="btn btn-primary">Salvar</button>
        </div>

    </div>

</form>
